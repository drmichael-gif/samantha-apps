<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        .weather-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .weather-info {
            margin-bottom: 10px;
        }
        footer {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Weather App</h1>
    </header>
    <div class="weather-container">
        <div class="weather-info" id="location"></div>
        <div class="weather-info" id="temperature"></div>
        <div class="weather-info" id="description"></div>
    </div>
    <footer>
        Built by Samantha for Michael Nguyen
    </footer>
    <script>
        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                const location = `Latitude: ${lat}, Longitude: ${lon}`;
                const temperature = `Temperature: ${data.current_weather.temperature}°C`;
                const description = `Weather: ${data.current_weather.weathercode}`;
                document.getElementById('location').textContent = location;
                document.getElementById('temperature').textContent = temperature;
                document.getElementById('description').textContent = description;
            } catch (error) {
                document.getElementById('location').textContent = 'Error fetching weather data.';
                console.error('Error:', error);
            }
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        fetchWeather(position.coords.latitude, position.coords.longitude);
                    },
                    error => {
                        document.getElementById('location').textContent = 'Unable to retrieve your location.';
                    }
                );
            } else {
                document.getElementById('location').textContent = 'Geolocation is not supported by this browser.';
            }
        }

        getLocation();
    </script>
</body>
</html>
