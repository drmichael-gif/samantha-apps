<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/news - Dubai Latest News</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #007BFF;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        .news-item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-item h2 {
            margin: 0 0 10px;
            font-size: 1.25em;
        }
        .news-item p {
            margin: 0;
        }
        footer {
            background-color: #007BFF;
            color: #fff;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        @media (max-width: 600px) {
            header, footer {
                padding: 15px;
            }
            .news-item h2 {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>/news - Latest News in Dubai</h1>
    </header>
    <main id="news-container">
        <!-- News items will be injected here -->
    </main>
    <footer>
        Built by Samantha for Michael Nguyen
    </footer>
    
    <script>
        async function fetchNews() {
            try {
                const response = await fetch('https://newsapi.org/v2/top-headlines?country=ae&q=Dubai&apiKey=YOUR_API_KEY');
                const data = await response.json();
                const newsContainer = document.getElementById('news-container');
                newsContainer.innerHTML = '';

                if (data.articles.length === 0) {
                    newsContainer.innerHTML = '<p>No news articles found.</p>';
                    return;
                }

                data.articles.forEach(article => {
                    const newsItem = document.createElement('div');
                    newsItem.className = 'news-item';
                    newsItem.innerHTML = `
                        <h2>${article.title}</h2>
                        <p>${article.description || 'No description available.'}</p>
                        <a href="${article.url}" target="_blank">Read more</a>
                    `;
                    newsContainer.appendChild(newsItem);
                });
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('news-container').innerHTML = '<p>Failed to load news. Please try again later.</p>';
            }
        }

        fetchNews();
    </script>
</body>
</html>
```

Note: Replace `'YOUR_API_KEY'` with your actual API key from NewsAPI (https://newsapi.org/). This script fetches the latest news headlines for Dubai using NewsAPI and displays them on the page.
