<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App for Medellín</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-bottom: 20px;
        }
        .weather-info {
            margin: 20px 0;
        }
        .error {
            color: red;
        }
        footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather in Medellín</h1>
        <div id="weather" class="weather-info">Loading...</div>
        <footer>Built by Samantha for Michael Nguyen</footer>
    </div>

    <script>
        async function fetchWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=6.2442&longitude=-75.5812&current_weather=true');
                if (!response.ok) {
                    throw new Error('Failed to fetch weather data');
                }
                const data = await response.json();
                const weather = data.current_weather;
                document.getElementById('weather').innerHTML = `
                    <p>Temperature: ${weather.temperature}°C</p>
                    <p>Wind Speed: ${weather.windspeed} km/h</p>
                    <p>Weather: ${weather.weathercode}</p>
                `;
            } catch (error) {
                document.getElementById('weather').innerHTML = `<p class="error">${error.message}</p>`;
            }
        }

        fetchWeather();
    </script>
</body>
</html>
